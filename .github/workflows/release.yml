name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Extract release notes from changelog
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $changelogPath = "CHANGELOG.md"
          $notesPath = "release_notes.md"

          if (-not (Test-Path $changelogPath)) {
            throw "CHANGELOG.md not found."
          }

          $content = Get-Content $changelogPath -Raw
          $normalized = $content -replace "`r`n", "`n"
          $escapedVersion = [Regex]::Escape($version)
          $pattern = "(?ms)^##\s+\[$escapedVersion\].*?(?=^##\s+\[|\z)"
          $match = [Regex]::Match($normalized, $pattern)

          if (-not $match.Success) {
            throw "No changelog section found for version $version in CHANGELOG.md"
          }

          $notes = $match.Value.Trim()
          Set-Content -Path $notesPath -Value $notes -NoNewline
          "NOTES_PATH=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Restore & Publish
        shell: pwsh
        run: |
          dotnet restore ".\KeyPulse Signal.sln"
          dotnet publish ".\KeyPulse.csproj" -c Release -r win-x64 --no-self-contained -o publish\ /p:Version=${{ steps.version.outputs.VERSION }} /p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Install Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer\KeyPulse.iss
          options: /DAppVersion=${{ steps.version.outputs.VERSION }}

      - name: Compute installer SHA-256
        shell: pwsh
        run: |
          $installer = Get-ChildItem installer/output/KeyPulse-Signal-Setup-*.exe |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer artifact not found." }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$hash *$($installer.Name)" | Set-Content -Path "$($installer.FullName).sha256" -NoNewline -Encoding ascii
          Write-Host "SHA-256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/KeyPulse-Signal-Setup-*.exe
            installer/output/KeyPulse-Signal-Setup-*.exe.sha256
          body_path: ${{ steps.notes.outputs.NOTES_PATH }}

